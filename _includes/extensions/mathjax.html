<script>
(function () {
  var body = document.body.textContent;
  if (!body.match(/(?:\$\$|\\\(|\\\[|\\begin\{)/)) {
    return;
  }
  window.MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$']]
    },
    chtml: {
      fontCache: 'global'
    }
  };
  var script = document.createElement('script');
  script.src = 'https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js';
  script.defer = true;
  document.head.appendChild(script);
})();
</script>
